<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Rôles d'Honneur — T & F Mariage</title>
<!-- Prevent flash-of-content during page transition -->
<script>if(sessionStorage.getItem('cgm_t'))document.documentElement.setAttribute('data-trans-in','');</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
/* ═══════════════════════════════════════════════
   Phase color accents
   ═══════════════════════════════════════════════ */
:root {
  --ph1: var(--gold);    --ph1-bg: rgba(201,168,108,.07);
  --ph2: var(--ocean);   --ph2-bg: rgba(79,109,138,.06);
  --ph3: var(--bord);    --ph3-bg: rgba(107,32,53,.06);
  --ph4: var(--navy);    --ph4-bg: rgba(31,47,68,.05);
  --red-bg: rgba(107,32,53,.06); --red-border: rgba(107,32,53,.2);
}

/* ═══════════════════════════════════════════════
   PAGE HEADER — navy strip
   ═══════════════════════════════════════════════ */
.page-head {
  background: var(--navy);
  padding: 4.5rem var(--page-pad) 3.5rem;
  position: relative;
  overflow: hidden;
}
.page-head::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 80% at 80% 50%, rgba(79,109,138,.35) 0%, transparent 65%);
  pointer-events: none;
}
/* Ghost logo sur fond navy — inversé pour apparaître blanc */
.ph-ghost-logo {
  position: absolute;
  right: 3rem;
  bottom: -1rem;
  width: clamp(120px, 15vw, 200px);
  height: auto;
  filter: invert(1);
  opacity: .07;
  pointer-events: none;
  user-select: none;
}

.ph-inner { max-width: 680px; position: relative; z-index: 1; }

.ph-script {
  font-family: var(--font-script);
  font-size: 1.65rem;
  color: rgba(201,168,108,.55);
  margin-bottom: .15rem;
  display: block;
}
.ph-title {
  font-family: var(--font-title);
  font-weight: 400;
  font-size: clamp(2rem, 4.5vw, 3.8rem);
  color: #fff;
  line-height: 1.1;
  margin-bottom: .9rem;
}
.ph-desc {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .85rem;
  line-height: 1.75;
  color: rgba(250,245,239,.4);
  max-width: 460px;
}

/* ═══════════════════════════════════════════════
   FILTER BAR
   ═══════════════════════════════════════════════ */
.filter-bar {
  position: sticky;
  top: var(--nav-h);
  z-index: 100;
  background: var(--cream);
  border-bottom: 1px solid var(--gold-border);
  padding: .6rem var(--page-pad);
  display: flex;
  flex-direction: column;
  gap: .3rem;
}
.filter-row {
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: nowrap;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-section {
  display: flex;
  gap: .3rem;
  padding-right: 1.2rem;
  margin-right: 1.2rem;
  border-right: 1px solid var(--gold-border);
  flex-shrink: 0;
}
.filter-section:last-child { border-right: none; padding-right: 0; margin-right: 0; }

.fb {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .68rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--text-light);
  padding: .42rem .88rem;
  border: 1px solid transparent;
  white-space: nowrap;
  cursor: pointer;
  background: none;
  transition: all var(--dur-mid) ease;
}
.fb:hover { color: var(--navy); border-color: var(--border); }
.fb.active { color: var(--cream); background: var(--navy); border-color: var(--navy); }
.fb[data-phase="1"].active { background: var(--gold2); border-color: var(--gold2); }
.fb[data-phase="2"].active { background: var(--ocean); border-color: var(--ocean); }
.fb[data-phase="3"].active { background: var(--bord);  border-color: var(--bord);  }
.fb[data-phase="4"].active { background: #3A4D60;      border-color: #3A4D60;      }

.search-input {
  font-family: var(--font-body);
  font-size: .8rem;
  font-weight: 300;
  color: var(--text);
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--gold-border);
  padding: .36rem .15rem;
  width: 185px;
  outline: none;
  transition: border-color var(--dur-mid) ease;
  flex-shrink: 0;
}
.search-input::placeholder { color: var(--text-light); }
.search-input:focus { border-color: var(--ocean); }

/* ═══════════════════════════════════════════════
   CONTENT
   ═══════════════════════════════════════════════ */
.content {
  padding: 3rem var(--page-pad) 5rem;
  max-width: 1400px;
  margin: 0 auto;
}

/* ─── Phase groups ─── */
.phase-group { margin-bottom: 4.5rem; }

.phase-header {
  display: flex;
  align-items: center;
  gap: 1.4rem;
  padding-bottom: .85rem;
  margin-bottom: 1.8rem;
  border-bottom: 1px solid var(--gold-border);
}
.phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ph1 .phase-dot { background: var(--gold); }
.ph2 .phase-dot { background: var(--ocean); }
.ph3 .phase-dot { background: var(--bord); }
.ph4 .phase-dot { background: #3A4D60; }

.phase-num {
  font-family: var(--font-title);
  font-weight: 400;
  font-size: 2rem;
  line-height: 1.15;
}
.ph1 .phase-num { color: rgba(201,168,108,.28); }
.ph2 .phase-num { color: rgba(79,109,138,.22); }
.ph3 .phase-num { color: rgba(107,32,53,.2); }
.ph4 .phase-num { color: rgba(31,47,68,.18); }

.phase-name {
  font-family: var(--font-sub);
  font-weight: 400;
  font-size: 1.05rem;
  color: var(--navy);
  letter-spacing: .02em;
}
.phase-info {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .65rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-left: auto;
}

/* ─── Role cards ─── */
.role-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
  gap: 1rem;
}

.role-card {
  background: #fff;
  padding: 1.7rem 1.5rem 1.5rem;
  position: relative;
  cursor: pointer;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 205px;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity .48s var(--ease-out),
              transform .48s var(--ease-out),
              box-shadow var(--dur-mid) ease,
              border-color var(--dur-mid) ease;
}
.role-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  transition: opacity var(--dur-mid) ease;
}
.ph1 .role-card::before { background: linear-gradient(to right, transparent, var(--gold),  transparent); opacity: .45; }
.ph2 .role-card::before { background: linear-gradient(to right, transparent, var(--ocean), transparent); opacity: .45; }
.ph3 .role-card::before { background: linear-gradient(to right, transparent, var(--bord),  transparent); opacity: .45; }
.ph4 .role-card::before { background: linear-gradient(to right, transparent, #3A4D60,      transparent); opacity: .45; }

.role-card.anim-in { opacity: 1; transform: translateY(0); }
.role-card:hover {
  box-shadow: 0 10px 36px rgba(31,47,68,.10);
  border-color: var(--border2);
  transform: translateY(-3px) !important;
}
.role-card:hover::before { opacity: 1; }
.role-card.full { background: var(--cream2); }

/* ─── Inside card ─── */
.role-badge {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  margin-bottom: .8rem;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.badge-dot.open    { background: var(--green); }
.badge-dot.partial { background: var(--ocean); }
.badge-dot.full    { background: var(--bord);  }
.badge-text {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .63rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--text-light);
}

.role-num {
  font-family: var(--font-title);
  font-weight: 400;
  font-size: 2.2rem;
  line-height: 1.15;
  margin-bottom: .7rem;
}
.ph1 .role-num { color: rgba(201,168,108,.18); }
.ph2 .role-num { color: rgba(79,109,138,.15);  }
.ph3 .role-num { color: rgba(107,32,53,.15);   }
.ph4 .role-num { color: rgba(31,47,68,.12);    }

.role-phase {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .6rem;
  letter-spacing: .09em;
  text-transform: uppercase;
  margin-bottom: .25rem;
}
.ph1 .role-phase { color: var(--gold); }
.ph2 .role-phase { color: var(--ocean); }
.ph3 .role-phase { color: var(--bord); }
.ph4 .role-phase { color: #3A4D60; }

.role-name {
  font-family: var(--font-sub);
  font-weight: 400;
  font-size: .98rem;
  color: var(--navy);
  line-height: 1.25;
  margin-bottom: .18rem;
}
.role-en {
  font-family: var(--font-body);
  font-weight: 300;
  font-style: italic;
  font-size: .73rem;
  color: var(--text-light);
  margin-bottom: .8rem;
}
.role-spots { margin-top: auto; }
.spot-row { display: flex; align-items: center; gap: .4rem; margin-bottom: .25rem; }
.spot-circle {
  width: 15px; height: 15px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  flex-shrink: 0;
}
.spot-circle.taken { background: var(--ocean); border-color: var(--ocean); }
.spot-circle-name { font-family: var(--font-body); font-weight: 300; font-size: .78rem; color: var(--navy); font-style: italic; }
.spot-circle-empty { font-family: var(--font-body); font-weight: 300; font-size: .62rem; letter-spacing: .04em; text-transform: uppercase; color: var(--text-light); }
.spot-remove { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: .7rem; line-height: 1; padding: .2rem .35rem; margin-left: auto; border-radius: 50%; transition: color .18s ease, background .18s ease; }
.spot-remove:hover { color: #b03030; background: rgba(176,48,48,.08); }

.role-cta-hint {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .64rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-top: .6rem;
  opacity: 0;
  transition: opacity var(--dur-mid) ease;
}
.ph1 .role-cta-hint { color: var(--gold); }
.ph2 .role-cta-hint { color: var(--ocean); }
.ph3 .role-cta-hint { color: var(--bord);  }
.ph4 .role-cta-hint { color: #3A4D60; }
.role-card:hover .role-cta-hint { opacity: 1; }

/* ═══════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════ */
.modal-bg {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(31,47,68,.5);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-mid) ease;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--cream);
  max-width: 520px;
  width: 100%;
  position: relative;
  transform: translateY(18px) scale(.97);
  transition: transform .35s var(--ease-spring);
  max-height: 92svh;
  overflow-y: auto;
  border: 1px solid var(--border2);
  scrollbar-width: thin;
}
.modal-bg.open .modal { transform: none; }

.modal-top-line { height: 2.5px; }
.modal-ph1 .modal-top-line { background: linear-gradient(to right, transparent, var(--gold)  30%, var(--gold)  70%, transparent); }
.modal-ph2 .modal-top-line { background: linear-gradient(to right, transparent, var(--ocean) 30%, var(--ocean) 70%, transparent); }
.modal-ph3 .modal-top-line { background: linear-gradient(to right, transparent, var(--bord)  30%, var(--bord)  70%, transparent); }
.modal-ph4 .modal-top-line { background: linear-gradient(to right, transparent, #3A4D60 30%, #3A4D60 70%, transparent); }

.modal-close {
  position: absolute;
  top: 1rem; right: 1rem;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-light);
  font-size: .68rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  background: none;
  transition: border-color var(--dur-mid) ease, color var(--dur-mid) ease, transform var(--dur-slow) var(--ease-spring);
}
.modal-close:hover { border-color: var(--border2); color: var(--navy); transform: rotate(90deg); }

.modal-head {
  padding: 2rem 2rem 1.6rem;
  border-bottom: 1px solid var(--gold-border);
}
.modal-tag {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .65rem;
  letter-spacing: .09em;
  text-transform: uppercase;
  margin-bottom: .55rem;
}
.modal-ph1 .modal-tag { color: var(--gold); }
.modal-ph2 .modal-tag { color: var(--ocean); }
.modal-ph3 .modal-tag { color: var(--bord); }
.modal-ph4 .modal-tag { color: #3A4D60; }

.modal-name {
  font-family: var(--font-title);
  font-weight: 400;
  font-size: clamp(1.4rem, 4vw, 1.9rem);
  color: var(--navy);
  line-height: 1.1;
  margin-bottom: .28rem;
}
.modal-en { font-family: var(--font-body); font-weight: 300; font-style: italic; font-size: .8rem; color: var(--text-light); }

.modal-body { padding: 1.6rem 2rem; }
.modal-sec { margin-bottom: 1.2rem; }
.modal-sec-lbl {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .63rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: .38rem;
}
.modal-ph1 .modal-sec-lbl { color: var(--gold); }
.modal-ph2 .modal-sec-lbl { color: var(--ocean); }
.modal-ph3 .modal-sec-lbl { color: var(--bord); }
.modal-ph4 .modal-sec-lbl { color: #3A4D60; }
.modal-sec-txt { font-family: var(--font-body); font-weight: 300; font-size: .87rem; line-height: 1.75; color: var(--text-mid); }

.modal-sep { height: 1px; background: var(--gold-border); margin: 1.2rem 0; }

.modal-signup { padding: 0 2rem 2rem; }
.modal-signup-title { font-family: var(--font-sub); font-weight: 400; font-size: 1rem; color: var(--navy); margin-bottom: .35rem; }
.modal-signup-sub { font-family: var(--font-body); font-weight: 300; font-size: .78rem; color: var(--text-light); margin-bottom: 1rem; line-height: 1.65; }

.spots-display { display: flex; flex-direction: column; gap: .38rem; margin-bottom: 1.2rem; }
.spot-line { display: flex; align-items: center; gap: .6rem; }

.signup-input-row { display: flex; gap: .7rem; margin-bottom: .65rem; }
.signup-input {
  flex: 1;
  font-family: var(--font-body);
  font-weight: 300;
  font-style: italic;
  font-size: .95rem;
  color: var(--navy);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--border2);
  padding: .38rem .1rem;
  outline: none;
  transition: border-color var(--dur-mid) ease;
}
.signup-input::placeholder { color: var(--text-light); }
.signup-input:focus { border-color: var(--ocean); }

.btn-join {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: .68rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--cream);
  background: var(--navy);
  padding: .78rem 1.2rem;
  white-space: nowrap;
  cursor: pointer;
  border: none;
  transition: background var(--dur-mid) ease;
}
.btn-join:hover { background: var(--ocean); }
.btn-join:disabled { background: rgba(31,47,68,.25); cursor: not-allowed; }

.modal-msg { font-family: var(--font-body); font-size: .78rem; padding: .4rem .65rem; margin-top: .4rem; }
.modal-msg.success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.modal-msg.error   { background: var(--red-bg);   color: var(--bord);  border: 1px solid var(--red-border); }

.modal-full { font-family: var(--font-body); font-size: .84rem; color: var(--text-mid); padding: .8rem; border: 1px solid var(--gold-border); background: var(--cream2); text-align: center; }

.empty { padding: 5rem 2rem; text-align: center; grid-column: 1 / -1; }
.empty p { font-family: var(--font-sub); font-style: italic; font-size: 1.1rem; color: var(--text-light); }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 900px) {
  .page-head   { padding: 3.5rem 1.4rem 2.8rem; }
  .filter-bar  { padding: .65rem .9rem; }
  .content     { padding: 2rem 1.2rem 4rem; }
  .ph-ghost-logo { display: none; }
  .modal-head, .modal-body, .modal-signup { padding-left: 1.4rem; padding-right: 1.4rem; }
}
@media (max-width: 560px) {
  .role-grid { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════════
   FILTER — Pour active colors
   ═══════════════════════════════════════════════ */
.fb[data-pour="mariee"].active { background: var(--bord);  border-color: var(--bord); }
.fb[data-pour="marie"].active  { background: #3A4D60;      border-color: #3A4D60; }
.fb[data-pour="mixte"].active  { background: var(--ocean); border-color: var(--ocean); }

/* Période active colors */
.fb[data-periode="preparatifs"].active { background: var(--gold2);  border-color: var(--gold2); }
.fb[data-periode="ceremonies"].active  { background: var(--ocean);  border-color: var(--ocean); }
.fb[data-periode="vin_honneur"].active { background: var(--bord);   border-color: var(--bord); }
.fb[data-periode="diner"].active       { background: #3A4D60;       border-color: #3A4D60; }
.fb[data-periode="soiree"].active      { background: var(--navy);   border-color: var(--navy); }

/* Pending toggle */
.fb.pending-active { color: var(--cream); background: rgba(107,32,53,.65); border-color: rgba(107,32,53,.65); }

/* ═══════════════════════════════════════════════
   POUR TAG on cards
   ═══════════════════════════════════════════════ */
.role-pour-tag {
  position: absolute;
  top: .72rem;
  right: .85rem;
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .54rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  padding: .16rem .45rem;
  border: 1px solid;
}
.role-pour-mariee { color: var(--bord);  border-color: rgba(107,32,53,.28); }
.role-pour-marie  { color: #3A4D60;     border-color: rgba(58,77,96,.28); }
.role-pour-mixte  { color: var(--ocean);border-color: rgba(79,109,138,.28); }

/* ═══════════════════════════════════════════════
   PENDING role cards
   ═══════════════════════════════════════════════ */
.role-card.pending {
  border: 1px dashed var(--border2);
  opacity: .78;
}
.role-card.pending::before { opacity: 0 !important; }
.role-card.pending:hover   { opacity: 1; }
.role-card.pending:hover::before { opacity: .25 !important; }

.pending-badge {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  margin-bottom: .5rem;
}
.pending-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-light);
  flex-shrink: 0;
}
.pending-badge-text {
  font-family: var(--font-body);
  font-weight: 300;
  font-size: .6rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--text-light);
  font-style: italic;
}
</style>
</head>
<body>

<!-- ═══ PAGE TRANSITION OVERLAY ═══ -->
<div id="t-overlay" aria-hidden="true">
  <div class="t-door t-door-l"></div>
  <div class="t-door t-door-r"></div>
  <div class="t-center">
    <span class="t-eyebrow" id="t-eyebrow"></span>
    <span class="t-title" id="t-title"></span>
  </div>
</div>

<!-- ═══ NAVIGATION ═══ -->
<nav class="nav" id="mainNav" aria-label="Navigation principale">
  <a href="index.html" class="nav-logo" aria-label="Accueil T & F">
    <img src="Logo.png" alt="T & F">
  </a>
  <ul class="nav-links" role="list">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="quiz.html">Questionnaire</a></li>
    <li><a href="resultat.html">Mes résultats</a></li>
  </ul>
  <a href="quiz.html" class="nav-cta">Trouver mon rôle</a>
</nav>

<!-- ═══ PAGE HEADER ═══ -->
<header class="page-head" aria-labelledby="page-title">

  {id:30, ph:4, phName:'La Soirée', num:'42', pending:true,
   nom:'Responsable des Cadeaux',   en:'The Favor Queen',
   pour:'mixte', periode:['soiree'], spots:2,
   importance:'Dernier point de contact, remettant le témoignage final de gratitude.',
   mission:"S'assurer que chaque invité récupère son cadeau de remerciement au départ.",
   impact:"Supprime le risque d'oubli de cadeaux sur les tables."},
];

/* ═══════════════════════════════════════════════
   LOCAL STORAGE HELPERS
   ═══════════════════════════════════════════════ */
/* Firebase Realtime Database */
const FB_URL = 'https://roles-du-mariage-default-rtdb.europe-west1.firebasedatabase.app/signups.json';
let _signups = {};

async function fbLoad() {
  try {
    const r = await fetch(FB_URL);
    const data = await r.json();
    _signups = (data && typeof data === 'object') ? data : {};
  } catch(e) { /* garde le cache local en cas d'erreur réseau */ }
}

async function fbSave() {
  try {
    await fetch(FB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_signups)
    });
  } catch(e) { /* silent fail */ }
}

function getData()   { return { signups: _signups }; }
function saveData(d) { _signups = d.signups || {}; fbSave(); }
function getRSups(id) { return (getData().signups || {})[String(id)] || []; }
function getSpots(id) { const r = ROLES.find(x => x.id === id); return r ? (r.spots || 2) : 2; }
function isFull(id)   { return getRSups(id).length >= getSpots(id); }
function doJoin(id, name) {
  const sups = getRSups(id);
  const maxSp = getSpots(id);
  if (sups.length >= maxSp || sups.map(n => n.toLowerCase()).includes(name.toLowerCase().trim())) return false;
  const d = getData();
  if (!d.signups[id]) d.signups[id] = [];
  d.signups[id].push(name.trim());
  saveData(d);
  return true;
}
function doLeave(id, name) {
  const d = getData();
  if (d.signups && d.signups[id])
    d.signups[id] = d.signups[id].filter(n => n.toLowerCase() !== name.toLowerCase().trim());
  saveData(d);
}

/* ═══════════════════════════════════════════════
   FILTER STATE
   ═══════════════════════════════════════════════ */
let curPeriode  = 'all';
let curPour     = 'all';
let curStatus   = 'all';
let curSearch   = '';
let showPending = false;
let openModalId = null;

function setPeriode(p, btn) {
  curPeriode = p;
  document.querySelectorAll('[data-periode]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildContent();
}
function setPour(p, btn) {
  curPour = p;
  document.querySelectorAll('[data-pour]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildContent();
}
function setStatus(s, btn) {
  curStatus = s;
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildContent();
}
function togglePending(btn) {
  showPending = !showPending;
  btn.classList.toggle('pending-active', showPending);
  buildContent();
}
function onSearch(v) { curSearch = v.toLowerCase().trim(); buildContent(); }

/* ═══════════════════════════════════════════════
   INTERSECTION OBSERVER FOR CARD ANIMATION
   ═══════════════════════════════════════════════ */
const cardObserver = new IntersectionObserver(function (entries) {
  entries.forEach(function (e, i) {
    if (e.isIntersecting) {
      setTimeout(function () { e.target.classList.add('anim-in'); }, i * 45);
      cardObserver.unobserve(e.target);
    }
  });
}, { threshold: .06 });

/* Nav scroll */
const mainNav = document.getElementById('mainNav');
window.addEventListener('scroll', function () {
  mainNav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ═══════════════════════════════════════════════
   BUILD CONTENT
   ═══════════════════════════════════════════════ */
function buildContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  [1, 2, 3, 4].forEach(function (ph) {
    let roles = ROLES.filter(r => r.ph === ph);

    // Période filter
    if (curPeriode !== 'all') roles = roles.filter(r => r.periode.includes(curPeriode));

    // Pour filter
    if (curPour !== 'all') roles = roles.filter(r => r.pour === curPour);

    // Pending visibility
    if (!showPending) roles = roles.filter(r => !r.pending);

    // Status filter (ignore for pending)
    if (curStatus === 'open') roles = roles.filter(r => r.pending || !isFull(r.id));
    if (curStatus === 'full') roles = roles.filter(r => !r.pending && isFull(r.id));

    // Search
    if (curSearch) roles = roles.filter(r =>
      getRSups(r.id).some(n => n.toLowerCase().includes(curSearch)) ||
      r.nom.toLowerCase().includes(curSearch)
    );

    if (!roles.length) return;

    const meta = PHASE_LABELS[ph];
    const g    = document.createElement('div');
    g.className = 'phase-group ' + PHASE_CLS[ph];
    g.innerHTML =
      '<div class="phase-header">' +
        '<div class="phase-dot"></div>' +
        '<span class="phase-num">0' + ph + '</span>' +
        '<span class="phase-name">' + meta.name + '</span>' +
        '<span class="phase-info">' + meta.time + '</span>' +
      '</div>' +
      '<div class="role-grid">' + roles.map(r => cardHtml(r)).join('') + '</div>';

    content.appendChild(g);
  });

  if (!content.children.length) {
    content.innerHTML = '<div class="empty"><p>Aucun rôle ne correspond à votre recherche.</p></div>';
  }
  document.querySelectorAll('.role-card:not(.anim-in)').forEach(el => cardObserver.observe(el));
}

function cardHtml(r) {
  const sups  = getRSups(r.id);
  const maxSp = r.spots || 2;
  const taken = sups.length;
  const free  = maxSp - taken;
  const full  = taken >= maxSp;
  const dotC  = full ? 'full' : taken > 0 ? 'partial' : 'open';
  const badge = full ? 'Complet' :
                (free === 1 && taken > 0) ? '1 place restante' :
                free === 1 ? '1 place disponible' :
                free + ' places disponibles';

  const spots = Array.from({length: maxSp}, function(_, i) {
    return sups[i]
      ? '<div class="spot-row"><div class="spot-circle taken"></div><span class="spot-circle-name">' + sups[i] + '</span></div>'
      : '<div class="spot-row"><div class="spot-circle"></div><span class="spot-circle-empty">Place disponible</span></div>';
  }).join('');

  const pourLabel = r.pour === 'mariee' ? 'Mariée' : r.pour === 'marie' ? 'Marié' : 'Mixte';
  const pourCls   = 'role-pour-' + r.pour;

  if (r.pending) {
    return '<div class="role-card pending" onclick="openModal(' + r.id + ')" tabindex="0" role="button" aria-label="Rôle en attente : ' + r.nom + '">' +
      '<span class="role-pour-tag ' + pourCls + '">' + pourLabel + '</span>' +
      '<div class="pending-badge"><div class="pending-dot"></div><span class="pending-badge-text">En attente</span></div>' +
      '<div class="role-num">' + r.num + '</div>' +
      '<p class="role-phase">' + r.phName + '</p>' +
      '<p class="role-name">' + r.nom + '</p>' +
      '<p class="role-en">' + r.en + '</p>' +
      '<div class="role-spots"></div>' +
      '<p class="role-cta-hint">Voir le détail →</p>' +
    '</div>';
  }

  return '<div class="role-card' + (full ? ' full' : '') + '" onclick="openModal(' + r.id + ')" tabindex="0" role="button" aria-label="Voir le rôle ' + r.nom + '">' +
    '<span class="role-pour-tag ' + pourCls + '">' + pourLabel + '</span>' +
    '<div class="role-badge"><div class="badge-dot ' + dotC + '"></div><span class="badge-text">' + badge + '</span></div>' +
    '<div class="role-num">' + r.num + '</div>' +
    '<p class="role-phase">' + r.phName + '</p>' +
    '<p class="role-name">' + r.nom + '</p>' +
    '<p class="role-en">' + r.en + '</p>' +
    '<div class="role-spots">' + spots + '</div>' +
    '<p class="role-cta-hint">' + (full ? 'Voir le détail →' : "Voir & m'inscrire →") + '</p>' +
  '</div>';
}

/* ═══════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════ */
function openModal(id) {
  const r = ROLES.find(x => x.id === id);
  if (!r) return;
  openModalId = id;

  const modal = document.getElementById('modal');
  modal.className = 'modal modal-ph' + r.ph;

  const pourLabel = r.pour === 'mariee' ? 'Côté Mariée' : r.pour === 'marie' ? 'Côté Marié' : 'Mixte';
  const periodLabels = { preparatifs:'Préparatifs', ceremonies:'Cérémonies', vin_honneur:"Vin d'Honneur", diner:'Dîner', soiree:'Soirée' };
  const periodeLabel = r.periode.length >= 5 ? 'Toute la journée'
    : r.periode.map(function(p) { return periodLabels[p] || p; }).join(', ');

  document.getElementById('mTag').textContent    = 'Rôle ' + r.num + ' — ' + pourLabel + ' · ' + periodeLabel;
  document.getElementById('mName').textContent   = r.nom;
  document.getElementById('mEn').textContent     = r.en;
  document.getElementById('mImp').textContent    = r.importance;
  document.getElementById('mMis').textContent    = r.mission;
  document.getElementById('mImpact').textContent = r.impact;

  renderModalSignup(id);
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalSignup(id) {
  const r    = ROLES.find(x => x.id === id);
  const maxSp = r ? (r.spots || 2) : 2;
  const sups  = getRSups(id);
  const full  = sups.length >= maxSp;
  const el    = document.getElementById('mSignup');

  // Pending roles: no signup
  if (r && r.pending) {
    el.innerHTML =
      '<h3 class="modal-signup-title">Rôle en attente</h3>' +
      '<p class="modal-signup-sub">Ce rôle est en cours de validation et n\'est pas encore disponible à l\'inscription.</p>';
    return;
  }

  const spotsHtml = '<div class="spots-display">' +
    Array.from({length: maxSp}, function(_, i) {
      return sups[i]
        ? '<div class="spot-line"><div class="spot-circle taken"></div><span class="spot-circle-name">' + sups[i] + '</span>' +
          '<button class="spot-remove" onclick="removeSpot(' + id + ',\'' + sups[i].replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')" title="Se désinscrire">✕</button></div>'
        : '<div class="spot-line"><div class="spot-circle"></div><span class="spot-circle-empty">Place disponible</span></div>';
    }).join('') +
  '</div>';

  if (full) {
    el.innerHTML = '<h3 class="modal-signup-title">Inscriptions</h3>' + spotsHtml +
      '<div class="modal-full">Ce rôle est complet.</div>' +
      '<div id="modalMsg"></div>';
    return;
  }

  el.innerHTML =
    '<h3 class="modal-signup-title">Rejoindre ce rôle</h3>' +
    '<p class="modal-signup-sub">Entrez votre prénom pour rejoindre ce rôle.</p>' +
    spotsHtml +
    '<div class="signup-input-row">' +
      '<input id="signupName" class="signup-input" type="text" placeholder="Votre prénom…" maxlength="40" autocomplete="given-name">' +
      '<button class="btn-join" id="btnJoin" onclick="joinRole()">Rejoindre</button>' +
    '</div>' +
    '<div id="modalMsg"></div>';

  document.getElementById('signupName').addEventListener('keydown', function(e) { if (e.key === 'Enter') joinRole(); });
}

function joinRole() {
  const name = (document.getElementById('signupName')?.value || '').trim();
  if (name.length < 2) { showMsg('Entrez au moins 2 caractères.', 'error'); return; }
  if (doJoin(openModalId, name)) {
    showMsg('✓ ' + name + ' a rejoint ce rôle.', 'success');
    renderModalSignup(openModalId);
    buildContent();
  } else {
    const s = getRSups(openModalId);
    if (s.map(n => n.toLowerCase()).includes(name.toLowerCase()))
      showMsg(name + ' est déjà inscrit(e).', 'error');
    else showMsg('Impossible de rejoindre ce rôle.', 'error');
  }
}

function leaveRole() {
  const name = (document.getElementById('signupName')?.value || '').trim();
  if (name.length < 2) { showMsg('Entrez votre prénom pour vous désinscrire.', 'error'); return; }
  removeSpot(openModalId, name);
}

function removeSpot(id, name) {
  const prev = getRSups(id).length;
  doLeave(id, name);
  if (getRSups(id).length < prev) {
    showMsg(name + ' retiré(e).', 'success');
    renderModalSignup(id);
    buildContent();
  } else {
    showMsg(name + " n'était pas inscrit(e).", 'error');
  }
}

function showMsg(msg, type) {
  const el = document.getElementById('modalMsg');
  if (el) { el.className = 'modal-msg ' + type; el.textContent = msg; }
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalBg')) return;
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
  openModalId = null;
}

document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });
document.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') {
    const focused = document.activeElement;
    if (focused && focused.classList.contains('role-card')) {
      const id = focused.getAttribute('onclick')?.match(/openModal\((\d+)\)/)?.[1];
      if (id) openModal(parseInt(id));
    }
  }
});

// Chargement initial depuis Firebase, puis synchro toutes les 30 secondes
fbLoad().then(buildContent);
setInterval(() => fbLoad().then(buildContent), 30000);
</script>
